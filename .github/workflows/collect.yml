name: daily-rtms-collect
on:
  schedule:
    - cron: "30 23 * * *"   # 매일 08:30 KST
  workflow_dispatch: {}      # 수동 실행 버튼
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: collect
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
        run: python collect.py
      - name: commit
        run: |
          git config user.name "rtms-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "rtms: $(date -u +%F) collect"
          git push
