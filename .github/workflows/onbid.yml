name: onbid-deal-flow

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["onbid.py", ".github/workflows/onbid.yml"]
  schedule:
    - cron: "30 23 * * *"   # 매일 08:30 KST — 공매 물건 갱신

concurrency:
  group: onbid-run
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect Onbid deals
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          echo "=== run $GITHUB_RUN_ID $(date -u +%FT%TZ) ===" > data/onbid_log.txt
          python -u onbid.py 2>&1 | tee -a data/onbid_log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> data/onbid_log.txt

      - name: Commit & push
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "onbid: deal flow $(date -u +%F)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep 5
          done
          echo "push failed after 3 attempts"; exit 1
